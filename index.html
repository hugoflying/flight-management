<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Turnaround</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border:rgba(17,24,39,.08);
      --shadow:0 10px 24px rgba(0,0,0,.08);
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
    }

    .page-wrap{
      max-width: 1600px;
      margin: 0 auto;
      padding: 18px;
    }

    .dashboard-card{
      border-radius: 18px;
      box-shadow: var(--shadow);
      background: var(--card);
      border: 1px solid var(--border);
      overflow: hidden;
      height: 100%;
    }

    .dashboard-card .card-content{
      padding: 1rem;
    }

    .flight-title{
      font-size: 1.35rem;
      font-weight: 900;
      line-height: 1.1;
    }

    .flight-subtitle{
      color: var(--muted);
      font-weight: 700;
      margin-top: 4px;
    }

    .muted{
      color: var(--muted);
    }

    .kv-grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: .75rem;
      margin-top: .75rem;
      margin-bottom: .9rem;
    }

    .kv-box{
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: .8rem;
      background: rgba(255,255,255,.55);
    }

    .kv-k{
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--muted);
      font-weight: 800;
      margin-bottom: .25rem;
    }

    .kv-v{
      font-size: 1rem;
      font-weight: 900;
      line-height: 1.1;
    }

    .cd-value{
      font-size: 1.25rem;
      font-weight: 900;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:1rem;
      flex-wrap:wrap;
      margin-bottom: 1rem;
    }

    .topbar h1{
      font-size: 1.5rem;
      font-weight: 900;
      margin: 0;
    }

    .empty-box{
      border: 2px dashed var(--border);
      border-radius: 18px;
      padding: 2rem;
      text-align:center;
      color: var(--muted);
      background: #fff;
    }

    .status-tag{
      font-weight: 900;
      border-radius: 999px;
    }

    .header-line{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:1rem;
    }

    .small-meta{
      text-align:right;
      font-size:.85rem;
      color: var(--muted);
      font-weight:700;
    }

    @media (max-width: 768px){
      .kv-grid{
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 480px){
      .kv-grid{
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <section class="section">
    <div class="page-wrap">

      <div class="topbar">
        <div>
          <h1>Dashboard Turnaround</h1>
          <p class="muted mb-0">Vols en cours de traitement</p>
        </div>

        <div class="tags are-medium mb-0">
          <span id="connState" class="tag is-warning status-tag">Connexion…</span>
          <span id="lastUpdate" class="tag is-light status-tag">--</span>
        </div>
      </div>

      <div id="cards" class="columns is-multiline"></div>

    </div>
  </section>

  <script>
    const socket = new WebSocket("wss://turnaround-sync.deruellehugo-49c.workers.dev/dashboard");
    const flights = new Map();

    function hasValue(v) {
      return v !== undefined && v !== null && String(v).trim() !== "";
    }

    function parseTimeToMinutes(hhmm) {
      if (!hhmm || !String(hhmm).includes(":")) return null;
      const [h, m] = String(hhmm).split(":").map(Number);
      if (Number.isNaN(h) || Number.isNaN(m)) return null;
      return h * 60 + m;
    }

    function parseHHMM(txt) {
      if (!txt || !String(txt).includes(":")) return null;
      const [h, m] = String(txt).split(":").map(Number);
      if (!Number.isFinite(h) || !Number.isFinite(m)) return null;
      return h * 60 + m;
    }

    function diffSigned(t, ref) {
      let d = t - ref;
      if (d > 720) d -= 1440;
      if (d < -720) d += 1440;
      return d;
    }

    function getNowMinutes() {
      const now = new Date();
      return {
        mins: now.getHours() * 60 + now.getMinutes(),
        secs: now.getSeconds()
      };
    }

    function fmtHHMM(mins) {
      const v = ((mins % 1440) + 1440) % 1440;
      const h = Math.floor(v / 60);
      const m = v % 60;
      return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
    }

    function computeTOBTData(f) {
      const cie = (f.Cie || "").toUpperCase();
      const from = (f.From || "").toUpperCase().trim();
      const isBVA = from === "BVA";

      const sibtTxt = f.SIBT || "";
      const aibtTxt = f.AIBT || "";
      const sobtTxt = f.SOBT || "";
      const ctotTxt = f.CTOT || "";

      if (!cie || !sobtTxt || (!sibtTxt && !isBVA)) {
        return { raw: null, adj: null };
      }

      const SIBT = parseHHMM(isBVA ? sobtTxt : sibtTxt);
      const SOBT = parseHHMM(sobtTxt);
      if (SIBT == null || SOBT == null) {
        return { raw: null, adj: null };
      }

      const AIBT = isBVA ? SOBT : (aibtTxt ? parseHHMM(aibtTxt) : SIBT);
      if (AIBT == null) {
        return { raw: null, adj: null };
      }

      const SIBT_ext = SIBT;
      const AIBT_ext = SIBT_ext + diffSigned(AIBT, SIBT);
      const SOBT_ext = SIBT_ext + diffSigned(SOBT, SIBT);

      const crewChange = !!(
        (f.ArrPNT || "").trim() ||
        (f.ArrPNC || "").trim()
      );

      const isDelayed = AIBT_ext > SIBT_ext;
      let TOBT_raw_ext = null;

      if (!isDelayed) {
        TOBT_raw_ext = SOBT_ext;
      } else {
        if (cie === "FR" || cie === "RK") {
          const turn = crewChange ? 35 : 25;
          const candidate = AIBT_ext + turn;
          TOBT_raw_ext = (candidate <= SOBT_ext) ? SOBT_ext : candidate;
        } else if (cie === "W4" || cie === "W6") {
          const type = (f.TypeAvion || "").toUpperCase();
          const turn = (type === "A321" || type === "A21N" || type === "A21NY") ? 35 : 30;
          const candidate = AIBT_ext + turn;
          TOBT_raw_ext = (candidate <= SOBT_ext) ? SOBT_ext : candidate;
        } else {
          const rot = SOBT_ext - SIBT_ext;
          TOBT_raw_ext = AIBT_ext + rot;
        }
      }

      const raw = ((TOBT_raw_ext % 1440) + 1440) % 1440;

      let TOBT_adj_ext = TOBT_raw_ext;

      if (ctotTxt) {
        const CTOT = parseHHMM(ctotTxt);
        if (CTOT != null) {
          const TOBT_ref = ((TOBT_raw_ext % 1440) + 1440) % 1440;
          const CTOT_ext = TOBT_raw_ext + diffSigned(CTOT, TOBT_ref);

          if (CTOT_ext > (TOBT_raw_ext + 15)) {
            TOBT_adj_ext = CTOT_ext - 15;
          }
        }
      }

      const adj = ((TOBT_adj_ext % 1440) + 1440) % 1440;

      return { raw, adj };
    }

    function computeCD(f) {
      const sibtTxt = f.SIBT || "";
      const aibtTxt = f.AIBT || "";
      const sobtTxt = f.SOBT || "";
      const aobtTxt = f.AOBT || "";

      const from = (f.From || "").toUpperCase().trim();
      const isBVA = from === "BVA";

      if (!sobtTxt || (!isBVA && (!aibtTxt || !sibtTxt))) {
        return { text: "--:--", bulmaClass: "has-text-grey" };
      }

      const SOBT = parseHHMM(sobtTxt);
      const SIBT = isBVA ? SOBT : parseHHMM(sibtTxt);
      const AIBT = isBVA ? SOBT : parseHHMM(aibtTxt);

      if (SOBT == null || SIBT == null || AIBT == null) {
        return { text: "--:--", bulmaClass: "has-text-grey" };
      }

      let targetMin = null;

      if (AIBT <= SIBT) {
        targetMin = SOBT;
      } else {
        const tobt = computeTOBTData(f).raw;
        if (tobt == null) {
          return { text: "--:--", bulmaClass: "has-text-grey" };
        }
        targetMin = tobt;
      }

      if (aobtTxt) {
        const AOBT = parseHHMM(aobtTxt);
        if (AOBT == null) {
          return { text: "--:--", bulmaClass: "has-text-grey" };
        }

        let diffMin = AOBT - targetMin;
        if (diffMin > 720) diffMin -= 1440;
        if (diffMin < -720) diffMin += 1440;

        const totalSeconds = diffMin * 60;
        const sign = totalSeconds >= 0 ? "+" : "-";
        const abs = Math.abs(totalSeconds);
        const mm = Math.floor(abs / 60);
        const ss = abs % 60;

        return {
          text: `${sign}${String(mm).padStart(2, "0")}:${String(ss).padStart(2, "0")}`,
          bulmaClass: totalSeconds > 0 ? "has-text-danger" : "has-text-success"
        };
      }

      const now = getNowMinutes();

      let diffMin = targetMin - now.mins;
      if (diffMin < -720) diffMin += 1440;
      if (diffMin > 720) diffMin -= 1440;

      const remainingSeconds = diffMin * 60 - now.secs;
      const sign = remainingSeconds <= 0 ? "+" : "";
      const abs = Math.abs(remainingSeconds);
      const mm = Math.floor(abs / 60);
      const ss = abs % 60;

      let bulmaClass = "has-text-success";
      if (remainingSeconds < 0) bulmaClass = "has-text-danger";
      else if (remainingSeconds <= 15 * 60) bulmaClass = "has-text-warning";

      return {
        text: `${sign}${String(mm).padStart(2, "0")}:${String(ss).padStart(2, "0")}`,
        bulmaClass
      };
    }

    function getDisplayedOutTime(f) {
      if (hasValue(f.AOBT)) return f.AOBT;
      const tobt = computeTOBTData(f).adj;
      if (tobt == null) return "--:--";
      return fmtHHMM(tobt);
    }

    function computeStatus(f) {
      if (hasValue(f.AOBT)) {
        return { text: "Départ", tagClass: "is-success" };
      }
      if (hasValue(f.FermeturePorteAvion)) {
        return { text: "Porte avion fermée", tagClass: "is-link" };
      }
      if (hasValue(f.AvionDernierEmbarque)) {
        return { text: "Embarquement terminé", tagClass: "is-link" };
      }
      if (hasValue(f.AvionPremierEmbarque)) {
        return { text: "Embarquement en cours", tagClass: "is-link" };
      }
      if (hasValue(f.DernierDebarque)) {
        return { text: "Débarquement terminé", tagClass: "is-link" };
      }
      if (hasValue(f.PremierDebarque)) {
        return { text: "Débarquement en cours", tagClass: "is-link" };
      }
      if (hasValue(f.AIBT)) {
        return { text: "Au bloc", tagClass: "is-link" };
      }
      return { text: "En attente", tagClass: "is-light" };
    }

    function isActiveFlight(f) {
      const started =
        hasValue(f.AIBT) ||
        hasValue(f.PremierDebarque) ||
        hasValue(f.DernierDebarque) ||
        hasValue(f.AvionPremierEmbarque) ||
        hasValue(f.AvionDernierEmbarque) ||
        hasValue(f.FermeturePorteAvion);

      const notDeparted = !hasValue(f.AOBT);

      return started && notDeparted;
    }

    function render() {
      const cards = document.getElementById("cards");

      const activeFlights = [...flights.values()]
        .filter(isActiveFlight)
        .sort((a, b) => {
          const ta = parseTimeToMinutes(a.SOBT || "99:99") ?? 9999;
          const tb = parseTimeToMinutes(b.SOBT || "99:99") ?? 9999;
          return ta - tb;
        });

      if (!activeFlights.length) {
        cards.innerHTML = `
          <div class="column is-12">
            <div class="empty-box">
              Aucun vol en cours de traitement
            </div>
          </div>
        `;
        return;
      }

      cards.innerHTML = activeFlights.map(f => {
        const cd = computeCD(f);
        const displayedOut = getDisplayedOutTime(f);
        const status = computeStatus(f);

        return `
          <div class="column is-4-desktop is-6-tablet is-12-mobile">
            <div class="card dashboard-card">
              <div class="card-content">
                <div class="header-line">
                  <div>
                    <div class="flight-title">${f.NVol || "--"}</div>
                    <div class="flight-subtitle">${f.To || "--"}</div>
                  </div>
                  <div class="small-meta">
                    <div>${f.Immat || ""}</div>
                  </div>
                </div>

                <div class="mt-3 mb-3">
                  <span class="tag ${status.tagClass} is-medium status-tag">${status.text}</span>
                </div>

                <div class="kv-grid">
                  <div class="kv-box">
                    <div class="kv-k">SIBT</div>
                    <div class="kv-v">${f.SIBT || "--:--"}</div>
                  </div>

                  <div class="kv-box">
                    <div class="kv-k">AIBT</div>
                    <div class="kv-v">${f.AIBT || "--:--"}</div>
                  </div>

                  <div class="kv-box">
                    <div class="kv-k">SOBT</div>
                    <div class="kv-v">${f.SOBT || "--:--"}</div>
                  </div>

                  <div class="kv-box">
                    <div class="kv-k">AOBT / TOBT</div>
                    <div class="kv-v">${displayedOut}</div>
                  </div>

                  <div class="kv-box">
                    <div class="kv-k">CD</div>
                    <div class="kv-v cd-value ${cd.bulmaClass}">${cd.text}</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join("");

      document.getElementById("lastUpdate").textContent =
        `Maj : ${new Date().toLocaleTimeString("fr-FR")}`;
    }

    socket.onopen = () => {
      const el = document.getElementById("connState");
      el.className = "tag is-success status-tag";
      el.textContent = "Connecté";
    };

    socket.onclose = () => {
      const el = document.getElementById("connState");
      el.className = "tag is-danger status-tag";
      el.textContent = "Déconnecté";
    };

    socket.onerror = () => {
      const el = document.getElementById("connState");
      el.className = "tag is-danger status-tag";
      el.textContent = "Erreur";
    };

    socket.onmessage = (event) => {
      const msg = JSON.parse(event.data);

      if (msg.__type === "snapshot") {
        flights.clear();
        (msg.flights || []).forEach(f => {
          flights.set(f.flightKey, f);
        });
        render();
        return;
      }

      if (msg.__type === "patch") {
        const current = flights.get(msg.flightKey) || { flightKey: msg.flightKey };
        flights.set(msg.flightKey, { ...current, ...msg.payload });
        render();
        return;
      }

      if (msg.__type === "remove") {
        flights.delete(msg.flightKey);
        render();
      }
    };

    setInterval(() => {
      render();
    }, 1000);
  </script>
</body>
</html>
