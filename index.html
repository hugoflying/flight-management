<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Préparation des vols</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  /* =========================
     TYPOGRAPHY SYSTEM
     ========================= */
  body,
  .title,
  .subtitle,
  .label,
  .help,
  .button,
  .box,
  .vol-header{
    font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  }

  /* Inputs + selects = JetBrains Mono */
  input,
  select,
  textarea{
    font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
                 "Liberation Mono", "Courier New", monospace;
    font-variant-numeric: tabular-nums;
  }

  /* =========================
     AK overlay
     ========================= */
  #akBackdrop{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.35);
    z-index: 4600;
  }

  #akPopover{
    position: fixed;
    inset: 10px;
    background: #fff;
    border-radius: 16px;
    z-index: 4700;
    padding: 12px;
    overflow: auto;
    box-shadow: 0 10px 28px rgba(0,0,0,.08);
    border: 1px solid rgba(0,0,0,.08);
  }

  #akPopover .ak-header{
    position: sticky;
    top: 0;
    z-index: 2;
    background: #fff;
    padding: 10px 0;
    border-bottom: 1px solid rgba(0,0,0,.08);
  }

  /* =========================
     Docs grid + band buttons
     ========================= */
  .doc-grid{
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
  }

  .doc-grid .button{
    width: 100%;
    min-height: 44px;
    white-space: nowrap;
    justify-content: flex-start;
  }

  .btn-band{
    position: relative;
    padding-left: 18px;
    overflow: hidden;
  }

  .btn-band::before{
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 8px;
    background: #6b7280;
  }

  .band-ryanair::before{ background: #ECC532; }
  .band-lauda::before{ background: #E71B43; }
  .band-presta::before{ background: #C6E0B4; }

  .band-gradient::before{
    background: linear-gradient(180deg, #C3017E 0%, #0E058E 100%);
  }

  /* =========================
     AK dropdown alignment
     ========================= */
  /* AK list pairs */
  .ak-list-wrap{ max-height: 50vh; overflow-y: auto; }

  /* =========================
     Center headers + badges
     ========================= */
  .box h2.title,
  .box h3.title{
    text-align: center;
  }

  #arr_badges_1,
  #dep_badges_1,
  #arr_badges_2,
  #dep_badges_2{
    display: flex;
    justify-content: center;
  }

  /* =========================
     iOS Glass buttons
     ========================= */
  .button.btn-band{
    position: relative;
    overflow: hidden;
    border-radius: 16px;
    color: rgba(255,255,255,.92) !important;
    text-shadow: 0 1px 0 rgba(0,0,0,.25);
    background: rgba(255,255,255,.08) !important;
    border: 1px solid rgba(255,255,255,.14) !important;
    backdrop-filter: blur(10px) saturate(140%);
    -webkit-backdrop-filter: blur(10px) saturate(140%);
    box-shadow:
      0 10px 20px rgba(0,0,0,.30),
      inset 0 1px 0 rgba(255,255,255,.10);
    transition:
      transform .14s ease,
      box-shadow .14s ease,
      border-color .14s ease,
      background .14s ease;
  }

  .button.btn-band::after{
    content:"";
    position:absolute;
    left: 10px;
    right: 10px;
    top: 8px;
    height: 40%;
    border-radius: 14px;
    background: linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,0));
    pointer-events:none;
    opacity: .7;
  }

  .button.btn-band:hover{
    transform: translateY(-1px);
    border-color: rgba(255,255,255,.18) !important;
    background: rgba(255,255,255,.10) !important;
    box-shadow:
      0 14px 26px rgba(0,0,0,.34),
      inset 0 1px 0 rgba(255,255,255,.12);
  }

  .button.btn-band:active{
    transform: translateY(0);
    background: rgba(255,255,255,.07) !important;
    box-shadow:
      0 8px 16px rgba(0,0,0,.34),
      inset 0 2px 6px rgba(0,0,0,.25);
  }

  .button.btn-band:focus-visible{
    outline: none;
    box-shadow:
      0 0 0 3px rgba(59,130,246,.35),
      0 14px 26px rgba(0,0,0,.34),
      inset 0 1px 0 rgba(255,255,255,.12);
  }

  @media (prefers-reduced-motion: reduce){
    .button.btn-band{ transition:none; }
    .button.btn-band:hover{ transform:none; }
  }

  /* =========================
     Bandeau VOL 1 / VOL 2
     ========================= */
  .vol-header{
    position: relative;
    text-align: center;
    margin-bottom: 22px;
    padding: 10px 0;
    font-weight: 600;
    letter-spacing: .5px;
    color: rgba(255,255,255,.85);
  }

  .vol-header::before{
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    height: 1px;
    background: linear-gradient(
      90deg,
      transparent,
      rgba(255,255,255,.12),
      transparent
    );
    transform: translateY(-50%);
  }

  .vol-header span{
    position: relative;
    background: rgba(255,255,255,.06);
    padding: 6px 18px;
    border-radius: 999px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,.08);
    box-shadow:
      0 4px 12px rgba(0,0,0,.35),
      inset 0 1px 0 rgba(255,255,255,.08);
  }

  .box h3.title{
    margin-bottom: 10px !important;
  }

  .tags{
    margin-top: 4px !important;
    margin-bottom: 16px !important;
  }

  /* Réserve la hauteur des badges */
  #arr_badges_1, #dep_badges_1,
  #arr_badges_2, #dep_badges_2{
    min-height: 32px;
    align-items: center;
  }

  #arr_badges_1:empty::before,
  #dep_badges_1:empty::before,
  #arr_badges_2:empty::before,
  #dep_badges_2:empty::before{
    content: "";
    display: inline-block;
    height: 24px;
  }

  /* =========================
     Toggle buttons Ménage
     ========================= */
  .menage-on{
    background: rgba(59,130,246,.18) !important;
    border-color: rgba(59,130,246,.45) !important;
    color: rgba(255,255,255,.92) !important;
    box-shadow: inset 0 0 0 1px rgba(59,130,246,.35);
    font-weight: 800;
  }

  /* =========================
     Header compact pour les modals
     ========================= */
  #rzaModal .vol-header,
  #siModal .vol-header,
  #menageModal .vol-header,
  #bbcgModal .vol-header{
    margin-bottom: 18px;
    padding: 6px 0;
  }

  #rzaModal .vol-header span,
  #siModal .vol-header span,
  #menageModal .vol-header span,
  #bbcgModal .vol-header span{
    padding: 4px 16px;
    font-size: 0.95rem;
  }

  /* AK pairs floating popover */
  .ak-pair-row{ display:flex; border:1px solid rgba(0,0,0,.08); border-radius:10px; background:#fff; margin-bottom:8px; overflow:hidden; }
  .ak-half{ flex:1; padding:10px; min-width:0; cursor:pointer; }
  .ak-half:hover{ background:rgba(0,0,0,.03); }
  .ak-half-empty{ flex:1; background:rgba(0,0,0,.02); min-height:60px; }
  .ak-half-done{ opacity:.55; }
  .ak-pair-divider{ width:1px; background:rgba(0,0,0,.08); flex-shrink:0; }
</style>
</head>

<body>
<section class="section">
  <div class="container">

    <h1 class="title has-text-centered">Préparation des vols</h1>

    <div class="columns">

      <!-- ================= VOL 1 ================= -->
      <div class="column">

        <div class="box">
          <div class="vol-header">
            <span>VOL 1</span>
          </div>

          <!-- Liste AK (dans VOL 1) -->
          <div class="field mb-2" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <button class="button is-small is-link" type="button" onclick="openAKMenu(1)">+ Liste vols</button>
            <span class="tag is-light" id="ak_status_1">—</span>
          </div>

          <div class="columns mb-0">
            <div class="column pb-0">
              <h3 class="title is-6">ARRIVÉE</h3>
              <div class="tags mb-2" id="arr_badges_1"></div>
              <input id="arr_date_1" type="date" class="input mb-2">
              <input id="arr_flt_1" class="input mb-2" placeholder="Flight Number">
              <input id="arr_from_1" class="input mb-2" placeholder="From">
            </div>

            <div class="column pb-0">
              <h3 class="title is-6">DÉPART</h3>
              <div class="tags mb-2" id="dep_badges_1"></div>
              <input id="dep_date_1" type="date" class="input mb-2">
              <input id="dep_flt_1" class="input mb-2" placeholder="Flight Number">
              <input id="dep_to_1" class="input mb-2" placeholder="To">
            </div>
          </div>

          <input id="parking_1" class="input mb-2" placeholder="Parking">
          <input id="dep_reg_1" class="input mb-2" placeholder="Registration">
          <input id="dep_type_1" class="input mb-2" placeholder="A/C Type">
          <input id="arr_reg_1" type="hidden">
          <input id="arr_type_1" type="hidden">
        </div>

        <div class="box">
          <div class="doc-grid">
            <button class="button is-dark btn-band band-ryanair" data-doc="LIR_RYANAIR" data-vol="1">LIR Ryanair</button>
            <button class="button is-dark btn-band band-lauda" data-doc="LIR_LAUDA" data-vol="1">LIR Lauda</button>
            <button class="button is-dark btn-band" data-doc="BINGO_FR" data-vol="1">Bingo Gate</button>

            <button class="button is-dark btn-band band-gradient" data-doc="BBCG_GATE" data-vol="1">BBCG Gate</button>
            <button class="button is-dark btn-band band-gradient" data-doc="WAIF" data-vol="1">Walkaround</button>
            <button class="button is-dark btn-band band-gradient" data-doc="RTB" data-vol="1">Ready To Board</button>
          </div>
        </div>

      </div>

      <!-- ================= VOL 2 ================= -->
      <div class="column">

        <div class="box">
          <div class="vol-header">
            <span>VOL 2</span>
          </div>

          <!-- Liste AK (dans VOL 2) -->
          <div class="field mb-2" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <button class="button is-small is-link" type="button" onclick="openAKMenu(2)">+ Liste vols</button>
            <span class="tag is-light" id="ak_status_2">—</span>
          </div>

          <div class="columns mb-0">
            <div class="column pb-0">
              <h3 class="title is-6">ARRIVÉE</h3>
              <div class="tags mb-2" id="arr_badges_2"></div>
              <input id="arr_date_2" type="date" class="input mb-2">
              <input id="arr_flt_2" class="input mb-2" placeholder="Flight Number">
              <input id="arr_from_2" class="input mb-2" placeholder="From">
            </div>

            <div class="column pb-0">
              <h3 class="title is-6">DÉPART</h3>
              <div class="tags mb-2" id="dep_badges_2"></div>
              <input id="dep_date_2" type="date" class="input mb-2">
              <input id="dep_flt_2" class="input mb-2" placeholder="Flight Number">
              <input id="dep_to_2" class="input mb-2" placeholder="To">
            </div>
          </div>

          <input id="parking_2" class="input mb-2" placeholder="Parking">
          <input id="dep_reg_2" class="input mb-2" placeholder="Registration">
          <input id="dep_type_2" class="input mb-2" placeholder="A/C Type">
          <input id="arr_reg_2" type="hidden">
          <input id="arr_type_2" type="hidden">
        </div>

        <div class="box">
          <div class="doc-grid">
            <button class="button is-dark btn-band band-ryanair" data-doc="LIR_RYANAIR" data-vol="2">LIR Ryanair</button>
            <button class="button is-dark btn-band band-lauda" data-doc="LIR_LAUDA" data-vol="2">LIR Lauda</button>
            <button class="button is-dark btn-band" data-doc="BINGO_FR" data-vol="2">Bingo Gate</button>

            <button class="button is-dark btn-band band-gradient" data-doc="BBCG_GATE" data-vol="2">BBCG Gate</button>
            <button class="button is-dark btn-band band-gradient" data-doc="WAIF" data-vol="2">Walkaround</button>
            <button class="button is-dark btn-band band-gradient" data-doc="RTB" data-vol="2">Ready To Board</button>
          </div>
        </div>

      </div>
    </div>

    <div class="box">
      <div class="doc-grid">
        <button class="button is-dark btn-band" data-doc="AUTOCONTROLE" data-vol="both">Autocontrôle</button>
        <button class="button is-dark btn-band band-presta" data-doc="PRESTA_DEP" data-vol="both">Prestations départ</button>
        <button class="button is-dark btn-band band-presta" data-doc="PRESTA_RET" data-vol="both">Prestations arrivée</button>
      </div>
    </div>

  </div>
</section>

<!-- POPUP AK -->
<div id="akBackdrop" onclick="closeAKMenu()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:4600;"></div>

<div id="akPopover" style="display:none;position:fixed;inset:60px 12px 12px 12px;background:#fff;border-radius:16px;z-index:4700;padding:12px;border:1px solid rgba(0,0,0,.08);overflow:auto;box-shadow:0 10px 28px rgba(0,0,0,.12);">
  <div style="position:sticky;top:0;z-index:2;background:#fff;padding:8px 0 10px;border-bottom:1px solid rgba(0,0,0,.08);display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
    <span class="tag is-light" id="akPopoverTitle">VOL</span>
    <button class="button is-small is-link" type="button" onclick="reloadAKMenu()">Rafraîchir</button>
    <span class="tag is-light" id="akPopoverStatus">—</span>
    <button class="button is-small is-light" type="button" style="margin-left:auto" onclick="closeAKMenu()">Fermer</button>
  </div>
  <div id="akPopoverList" style="margin-top:10px;"></div>
</div>

<!-- ===== RZA MODAL ===== -->
<div id="rzaBackdrop"
     style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:6000;"
     onclick="closeRZAModal(false)"></div>

<div id="rzaModal"
     style="display:none; position:fixed; inset:0; z-index:6100; align-items:center; justify-content:center; padding:14px;">
  <div class="box" style="width:min(420px, 100%); border-radius:16px;">

    <!-- Header glass -->
    <div class="vol-header">
      <span>Autocontrôle</span>
    </div>

    <div class="field">
      <label class="label">Nom et prénom du RZA :</label>
      <div class="control">
        <input id="rzaModalInput"
               class="input"
               type="text"
               autocomplete="off"
               spellcheck="false"
               placeholder="Nom Prénom">
      </div>
      <p class="help"
         id="rzaHelp"
         style="display:none; color:#ef4444; font-weight:800;">
        Merci de saisir le nom complet.
      </p>
    </div>

    <div class="buttons is-right">
      <button class="button is-light"
              type="button"
              onclick="closeRZAModal(false)">
        Annuler
      </button>

      <button class="button is-link"
              type="button"
              onclick="submitRZAModal()">
        Valider
      </button>
    </div>

  </div>
</div>

<!-- ===== SI MODAL (LIR Ryanair) ===== -->
<div id="siBackdrop"
     style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:6200;"
     onclick="closeSIModal(false)"></div>

<div id="siModal"
     style="display:none; position:fixed; inset:0; z-index:6300; align-items:center; justify-content:center; padding:14px;">
  <div class="box" style="width:min(520px, 100%); border-radius:16px;">

    <!-- Header glass -->
    <div class="vol-header">
      <span>LIR Ryanair</span>
    </div>

    <div class="field">
      <label class="label">Texte SI :</label>
      <div class="control">
        <textarea id="siModalInput"
                  class="textarea"
                  rows="5"
                  placeholder="Ex: Poussettes porte, poussettes CBS, wheelchair, bagages spéciaux, cargo etc."></textarea>
      </div>
      <p class="help">Tu peux laisser vide.</p>
    </div>

    <div class="field">
      <label class="checkbox">
        <input id="siModalHold" type="checkbox">
        HOLD SECURITY SEARCH
      </label>
    </div>

    <div class="field">
      <label class="checkbox">
        <input id="siModalMax5" type="checkbox">
        MAX 5 (B38M)
      </label>
    </div>

    <div class="buttons is-right">
      <button class="button is-light"
              type="button"
              onclick="closeSIModal(false)">
        Annuler
      </button>

      <button class="button is-link"
              type="button"
              onclick="submitSIModal()">
        Imprimer
      </button>
    </div>

  </div>
</div>

<!-- ===== BBCG MODAL (Bingo Gate) ===== -->
<div id="bbcgBackdrop"
     style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:6600;"
     onclick="closeBBCGModal(false)"></div>

<div id="bbcgModal"
     style="display:none; position:fixed; inset:0; z-index:6700; align-items:center; justify-content:center; padding:14px;">
  <div class="box" style="width:min(560px, 100%); border-radius:16px;">

    <!-- Header glass -->
    <div class="vol-header">
      <span>Bingo Gate</span>
    </div>

    <div class="field">
      <label class="label">Porte embarquement</label>
      <div class="control">
        <input id="bbcgGate"
               class="input"
               type="text"
               autocomplete="off"
               spellcheck="false"
               placeholder="Ex: T1-D, T2-A...">
      </div>
    </div>

    <div class="field">
      <label class="label">Compartiment de chargement</label>
      <div class="control">
        <div class="select is-fullwidth">
          <select id="bbcgComp">
            <option value="">—</option> <!-- option vide propre -->
            <option value="CP1">CP1</option>
            <option value="CP2">CP2</option>
            <option value="CP3">CP3</option>
            <option value="CP4">CP4</option>
            <option value="CP5">CP5</option>
          </select>
        </div>
      </div>
    </div>

    <div class="field">
      <label class="label">Numéro de bingo</label>

      <div class="control" style="display:flex; align-items:center; gap:10px;">
        <input id="bbcgBingoCard"
               class="input"
               style="max-width:110px; text-align:center;"
               inputmode="numeric"
               placeholder="1">

        <div style="opacity:.75; font-weight:900;">/</div>

        <input id="bbcgBingoOf"
               class="input"
               style="max-width:110px; text-align:center;"
               inputmode="numeric"
               placeholder="1">
      </div>

      <p class="help">Ex: 1 / 1</p>
    </div>

    <div class="buttons is-right mt-5">
      <button class="button is-light" type="button" onclick="closeBBCGModal(false)">Annuler</button>
      <button class="button is-link" type="button" onclick="submitBBCGModal()">Imprimer</button>
    </div>

  </div>
</div>

<!-- ===== MENAGE MODAL (Prestations arrivée) ===== -->
<div id="menageBackdrop"
     style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:6400;"
     onclick="closeMenageModal(false)"></div>

<div id="menageModal"
     style="display:none; position:fixed; inset:0; z-index:6500; align-items:center; justify-content:center; padding:14px;">
  <div class="box" style="width:min(560px, 100%); border-radius:16px;">

    <!-- Header stylé comme VOL 1 / VOL 2 -->
    <div class="vol-header">
      <span>Ménage</span>
    </div>

    <div class="columns mt-4">
      
      <!-- VOL 1 -->
      <div class="column has-text-centered">
        <h3 class="title is-6">VOL 1</h3>

        <div class="buttons is-centered mt-3">
          <button id="menage1TidyBtn"
                  type="button"
                  class="button is-light is-rounded">
            Tidy
          </button>

          <button id="menage1FullBtn"
                  type="button"
                  class="button is-light is-rounded">
            Full
          </button>
        </div>
      </div>

      <!-- VOL 2 -->
      <div class="column has-text-centered">
        <h3 class="title is-6">VOL 2</h3>

        <div class="buttons is-centered mt-3">
          <button id="menage2TidyBtn"
                  type="button"
                  class="button is-light is-rounded">
            Tidy
          </button>

          <button id="menage2FullBtn"
                  type="button"
                  class="button is-light is-rounded">
            Full
          </button>
        </div>
      </div>

    </div>

    <div class="buttons is-right mt-5">
      <button class="button is-light"
              type="button"
              onclick="closeMenageModal(false)">
        Annuler
      </button>

      <button class="button is-link"
              type="button"
              onclick="submitMenageModal()">
        Imprimer
      </button>
    </div>

  </div>
</div>

<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script type="module" src="app_v2.js"></script>
  
</body>
</html>
