<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Turnaround</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
--bg:#f6f7fb;
--card:#ffffff;
--text:#111827;
--muted:#6b7280;
--border:rgba(17,24,39,.08);
--shadow:0 8px 32px rgba(0,0,0,.14), 0 2px 8px rgba(0,0,0,.08);
}

html.dark{
--bg:#0f1115;
--card:#1c1f26;
--text:#f3f4f6;
--muted:#9ca3af;
--border:rgba(255,255,255,.08);
--shadow:0 10px 24px rgba(0,0,0,.4);
}
html.dark .kv-box{ background:rgba(255,255,255,.04); }
html.dark .empty-box{ background:var(--card); }

html,body{
background:var(--bg);
color:var(--text);
min-height:100%;
}

.page-wrap{
max-width:1600px;
margin:0 auto;
padding:18px;
}

.dashboard-card{
border-radius:18px;
box-shadow:var(--shadow);
background:var(--card);
border:1px solid var(--border);
overflow:hidden;
height:100%;
}

.dashboard-card .card-content{
padding:1rem;
}

.flight-title{
font-size:1.35rem;
font-weight:900;
}

.flight-subtitle{
color:var(--muted);
font-weight:700;
margin-top:4px;
}

.muted{
color:var(--muted);
}

.kv-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:.75rem;
margin-top:.75rem;
margin-bottom:.9rem;
}

.kv-box{
border:1px solid var(--border);
border-radius:14px;
padding:.8rem;
background:rgba(255,255,255,.55);
}

.kv-k{
font-size:.72rem;
text-transform:uppercase;
color:var(--muted);
font-weight:800;
margin-bottom:.25rem;
}

.kv-v{
font-size:1.35rem;
font-weight:900;
}

.cd-value{
font-size:1.25rem;
font-weight:900;
}
.cd-over{
color:#ef4444 !important;
font-weight:900 !important;
}

.topbar{
display:flex;
align-items:center;
justify-content:space-between;
gap:1rem;
flex-wrap:wrap;
margin-bottom:2.5rem;
position:relative;
}
.topbar-title{
position:absolute;
left:50%;
transform:translateX(-50%);
text-align:center;
pointer-events:auto;
}

.topbar h1{
font-size:1.5rem;
font-weight:900;
margin:0;
}

.empty-box{
border:2px dashed var(--border);
border-radius:18px;
padding:2rem;
text-align:center;
color:var(--muted);
background:#fff;
}

.status-tag{
font-weight:900;
border-radius:999px;
}

.header-line{
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:1rem;
}
.close-btn{
background:none;border:none;cursor:pointer;color:var(--muted);
font-size:1.2rem;line-height:1;padding:2px 6px;border-radius:8px;
transition:background .15s,color .15s;flex-shrink:0;
}
.close-btn:hover{background:rgba(239,68,68,.1);color:#ef4444;}

.small-meta{
text-align:right;
font-size:.85rem;
color:var(--muted);
font-weight:700;
}

@media(max-width:768px){
.kv-grid{grid-template-columns:repeat(2,1fr)}
}

@media(max-width:480px){
.kv-grid{grid-template-columns:1fr}
}

html.dark .button.is-light{
  background: rgba(255,255,255,.08) !important;
  color: var(--text) !important;
  border-color: rgba(255,255,255,.12) !important;
}
html.dark .button.is-light:hover{
  background: rgba(255,255,255,.14) !important;
}
html.dark .tag.is-light{
  background: rgba(255,255,255,.1) !important;
  color: var(--text) !important;
}

html.dark #utcToggle,
html.dark #darkToggle,
html.dark #langToggle,
html.dark #sortSelect{
  background: rgba(255,255,255,.08) !important;
  color: var(--text) !important;
  border-color: rgba(255,255,255,.12) !important;
}

html.dark .kv-box[style*="rgba(0,0,0,.04)"]{
  background: rgba(255,255,255,.04) !important;
  border-color: rgba(255,255,255,.08) !important;
}

@media(max-width:600px){
  .topbar{
    flex-wrap:wrap;
    gap:.5rem;
  }
  .topbar-title{
    position:static;
    transform:none;
    order:-1;
    width:100%;
    text-align:center;
  }
  .topbar h1{ font-size:1.2rem; }
  .topbar p{ font-size:.8rem; }
}

@media(max-width:600px){
  .section{ padding: 0.75rem !important; }
  .page-wrap{ padding: 10px !important; }
  .topbar{ margin-bottom: 1rem !important; }
}

.legend{
  display:flex;flex-wrap:wrap;gap:.5rem 1.2rem;
  justify-content:center;padding:1rem;margin-top:1.5rem;
  font-size:.78rem;font-weight:700;color:var(--muted);
}
.legend-item{ display:flex;align-items:center;gap:6px; }
.legend-dot{ width:12px;height:12px;border-radius:4px;flex-shrink:0; }

/* Vue liste */
#cards.list-view{ display:block !important; }
#cards.list-view .column{ width:100% !important; padding:.25rem 0 !important; }
#cards.list-view .dashboard-card{ border-radius:10px; }
#cards.list-view .dashboard-card .card-content{ padding:.6rem 1rem !important; }
#cards.list-view .kv-grid{ grid-template-columns:repeat(6,1fr) !important; gap:.4rem !important; }
#cards.list-view .kv-box{ padding:.4rem .5rem !important; }
#cards.list-view .kv-k{ font-size:.62rem !important; }
#cards.list-view .kv-v{ font-size:.9rem !important; }
#cards.list-view .flight-title{ font-size:1rem !important; }
#cards.list-view .flight-subtitle{ font-size:.75rem !important; }
#cards.list-view .mt-3.mb-3{ margin:.3rem 0 !important; }
#cards.list-view .header-line{ margin-bottom:.2rem !important; }
#cards.list-view .flight-title{ font-size:1.3rem !important; }
#cards.list-view .flight-subtitle{ font-size:.85rem !important; }
#cards.list-view .mt-3.mb-3{ text-align:center !important; }
@media(max-width:600px){
  #cards.list-view .kv-grid{ grid-template-columns:repeat(3,1fr) !important; }
}

.status-center{ display:none; position:absolute; left:50%; transform:translateX(-50%); justify-content:center; align-items:center; }
#cards.list-view .card-status-block{ display:none !important; }
#cards.list-view .status-center{ display:flex !important; }
#cards.list-view .header-line{ align-items:center !important; position:relative !important; }

#cards .column{
  transition: order 0.4s ease, transform 0.4s ease, opacity 0.3s ease;
}
#cards.animating .column{
  opacity: 0;
  transform: translateY(8px);
}
.dropdown{ position:relative; }
.dropdown.is-active .dropdown-menu{ display:block; }
.dropdown-menu{ display:none; position:absolute; z-index:999; padding-top:4px; }
.dropdown-content{ background:#fff !important; border-radius:6px; box-shadow:0 4px 16px rgba(0,0,0,.15); padding:.5rem 0; }
.dropdown-item{ color:#111827 !important; background:#fff !important; padding:.4rem 1rem; display:block; cursor:pointer; font-weight:700; font-size:.85rem; }
.dropdown-item:hover{ background:rgba(0,0,0,.06) !important; }
html.dark .dropdown-content{ background:#1c1f26; border:1px solid rgba(255,255,255,.1); }
html.dark .dropdown-item{ color:#f3f4f6 !important; }
html.dark .dropdown-item:hover{ background:rgba(255,255,255,.08); }

#detailPopup{
  display:none;
  position:fixed;
  z-index:9000;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:1rem 1.1rem;
  width:260px;
  box-shadow:0 8px 32px rgba(0,0,0,.18);
  pointer-events:auto;
}
.detail-title{ font-size:.95rem; font-weight:900; margin-bottom:.75rem; border-bottom:1px solid var(--border); padding-bottom:.5rem; }
.detail-log{ display:flex; flex-direction:column; gap:0; }
.detail-log-row{ display:flex; align-items:center; gap:.6rem; padding:.3rem 0; border-bottom:1px solid rgba(0,0,0,.05); }
html.dark .detail-log-row{ border-color:rgba(255,255,255,.06); }
.detail-log-row:last-child{ border-bottom:none; }
.detail-check{ width:18px; height:18px; border-radius:50%; border:2px solid #d1d5db; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:.65rem; }
.detail-check.done{ background:#22c55e; border-color:#22c55e; color:#fff; }
.detail-log-label{ flex:1; font-size:.8rem; font-weight:700; color:var(--text); }
.detail-log-label.empty{ color:var(--muted); font-weight:400; }
.detail-log-time{ font-size:.8rem; font-weight:900; color:var(--text); min-width:38px; text-align:right; }
.detail-log-time.empty{ color:var(--muted); font-weight:400; }
</style>
</head>

<body>

<section class="section">
<div class="page-wrap">

<div class="topbar">

  <!-- Gauche : toggles -->
  <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
    <div class="dropdown" id="sortDropdown">
  <div class="dropdown-trigger">
    <button class="button is-small is-light" style="font-weight:800;height:32px;" onclick="toggleSortDropdown()" aria-haspopup="true">
      <span id="sortLabel">EOBT</span>
      <span class="ml-1">▾</span>
    </button>
  </div>
  <div class="dropdown-menu" style="min-width:100px;">
    <div class="dropdown-content">
      <a class="dropdown-item" onclick="changeSort('EOBT')">EOBT</a>
      <a class="dropdown-item" onclick="changeSort('Parking')">Parking</a>
      <a class="dropdown-item" onclick="changeSort('SIBT')">SIBT</a>
      <a class="dropdown-item" onclick="changeSort('AIBT')">AIBT</a>
      <a class="dropdown-item" onclick="changeSort('SOBT')">SOBT</a>
      <a class="dropdown-item" onclick="changeSort('AOBT')">AOBT</a>
    </div>
  </div>
</div>
<button id="viewToggle" onclick="toggleView()" class="button is-small is-light" style="font-weight:800;height:32px;">≡</button>
<button id="darkToggle" onclick="toggleDark()" class="button is-small is-light" style="font-weight:800;height:32px;">CLAIR</button>
    <button id="utcToggle" onclick="toggleUTC()" class="button is-small is-light" style="font-weight:800;height:32px;">LOCAL</button>
    <button id="langToggle" onclick="toggleLang()" class="button is-small is-light" style="font-weight:800;height:32px;">FR</button>
  </div>

  <!-- Centre : titre absolu -->
  <div class="topbar-title">
    <h1>DASHBOARD</h1>
    <p class="muted mb-0" id="pageSubtitle">Vols en cours de traitement</p>
  </div>

  <!-- Droite : connexion + heure -->
  <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
    <span id="connState" class="tag is-warning status-tag" onclick="toggleConnection()" style="cursor:pointer;" title="Cliquer pour déconnecter">Connexion…</span>
    <span id="lastUpdate" class="tag is-light status-tag">--</span>
    <button class="button is-small is-danger is-light" onclick="clearAll()" style="font-weight:800;height:32px;" title="Effacer tous les vols">🗑</button>
  </div>

</div>

<div id="cards" class="columns is-multiline"></div>

</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#dbeafe;border:1.5px solid #3b82f6;"></div><span id="leg-early">En avance</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#dcfce7;border:1.5px solid #16a34a;"></div><span id="leg-ontime">A l'heure</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#ffedd5;border:1.5px solid #f97316;"></div><span id="leg-late">Retard &lt; 15 min</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#fee2e2;border:1.5px solid #ef4444;"></div><span id="leg-verylate">Retard &ge; 15 min</span></div>
</div>

<div id="detailPopup" onmouseleave="scheduleHideDetail()" onmouseenter="clearTimeout(_detailHideTimer)"><div class="detail-title" id="detailTitle">—</div><div id="detailContent"></div></div>
</section>

<script>

const WS_URL="wss://turnaround-sync.deruellehugo-49c.workers.dev/dashboard"

let socket=null
let reconnectTimer=null
let isUTC = localStorage.getItem('dashboard_utc') === '1'
let viewMode = localStorage.getItem('dashboard_view') || 'cards'
let sortBy   = localStorage.getItem('dashboard_sort') || 'EOBT'
let lang  = localStorage.getItem('dashboard_lang') || 'FR'
const flights=new Map()

const deletedKeys = new Set()

function connect() {

  socket = new WebSocket(WS_URL);

  socket.onopen = () => {
    clearTimeout(reconnectTimer);
    setConn("is-success", lang==="EN" ? "Connected" : "Connecté");
    console.log("DASHBOARD WS CONNECTED");
  };

  socket.onclose = () => {
    setConn("is-danger",  lang==="EN" ? "Disconnected" : "Déconnecté");
    console.log("DASHBOARD WS CLOSED");
    scheduleReconnect();
  };

  socket.onerror = (err) => {
    setConn("is-danger",  lang==="EN" ? "Error" : "Erreur");
    console.error("DASHBOARD WS ERROR", err);
  };

  socket.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      handleMessage(msg);
    } catch (e) {
    }
  };

}

function scheduleReconnect(){
if(manuallyDisconnected) return
clearTimeout(reconnectTimer)
reconnectTimer=setTimeout(connect,3000)
}

function setConn(cls,txt){
const el=document.getElementById("connState")
el.className="tag "+cls+" status-tag"
el.textContent=txt
}

function hasValue(v){
return v!==undefined && v!==null && String(v).trim()!=""
}

function parseHHMM(t){
if(!t||!String(t).includes(":"))return null
const[h,m]=t.split(":").map(Number)
if(isNaN(h)||isNaN(m))return null
return h*60+m
}

function fmtHHMM(min){
const v=((min%1440)+1440)%1440
const h=Math.floor(v/60)
const m=v%60
return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`
}

function isActiveFlight(f){
  const imported = hasValue(f.NVol) && hasValue(f.Cie) && hasValue(f.Date)

  const started =
    imported ||
    hasValue(f.AIBT)||
    hasValue(f.ArrPNT)||
    hasValue(f.ArrPNC)||
    hasValue(f.PremierDebarque)||
    hasValue(f.DernierDebarque)||
    hasValue(f.AvionPremierEmbarque)||
    hasValue(f.AvionDernierEmbarque)||
    hasValue(f.FermeturePorteAvion)

  if(!started) return false

  // Si AOBT rentré, disparaît 20min après
  if(hasValue(f.AOBT)){
    const aobtMins = parseHHMM(f.AOBT)
    if(aobtMins != null){
      const now = new Date()
      const nowMins = now.getHours()*60 + now.getMinutes()
      let diff = nowMins - aobtMins
      if(diff < -720) diff += 1440
      if(diff > 720)  diff -= 1440
      return diff < 20
    }
  }

  return true
}

const STATUS = {
  FR: {
    aobt:    "AU REPOUSSAGE",
    door:    "PORTE AVION FERMÉE",
    lastEmb: "EMBARQUEMENT TERMINÉ",
    firstEmb:"EMBARQUEMENT EN COURS",
    lastDeb: "DÉBARQUEMENT TERMINÉ",
    firstDeb:"DÉBARQUEMENT EN COURS",
    aibt:    "AU BLOC",
    crew:    "ÉQUIPAGE À BORD",
    waiting: "EN ATTENTE",
  },
  EN: {
    aobt:    "OFF BLOCK",
    door:    "A/C DOOR CLOSED",
    lastEmb: "BOARDING COMPLETED",
    firstEmb:"BOARDING IN PROGRESS",
    lastDeb: "DISEMBARKING COMPLETED",
    firstDeb:"DISEMBARKING IN PROGRESS",
    aibt:    "IN BLOCK",
    crew:    "CREW ON BOARD",
    waiting: "WAITING",
  }
}

function computeStatus(f){
  const s = STATUS[lang] || STATUS.FR
  if(hasValue(f.AOBT))               return{text:s.aobt,    tagClass:"is-success"}
  if(hasValue(f.FermeturePorteAvion))return{text:s.door,    tagClass:"is-link"}
  if(hasValue(f.AvionDernierEmbarque))return{text:s.lastEmb, tagClass:"is-link"}
  if(hasValue(f.AvionPremierEmbarque))return{text:s.firstEmb,tagClass:"is-link"}
  if(hasValue(f.DernierDebarque))    return{text:s.lastDeb, tagClass:"is-link"}
  if(hasValue(f.PremierDebarque))    return{text:s.firstDeb,tagClass:"is-link"}
  if(hasValue(f.AIBT))               return{text:s.aibt,    tagClass:"is-link"}
  if(hasValue(f.ArrPNT)||hasValue(f.ArrPNC)) return{text:s.crew, tagClass:"is-link"}
  return{text:s.waiting,tagClass:"is-light"}
}

function render() {
  const cards = document.getElementById("cards");

  function getSortValue(f){
    if(sortBy === 'EOBT')    return computeEOBT(f) ?? parseHHMM(f.SOBT) ?? parseHHMM(f.SIBT) ?? 9999;
    if(sortBy === 'Parking') return parseInt(f.Parking||"9999",10);
    if(sortBy === 'SIBT')    return parseHHMM(f.SIBT)  ?? 9999;
    if(sortBy === 'AIBT')    return parseHHMM(f.AIBT)  ?? 9999;
    if(sortBy === 'SOBT')    return parseHHMM(f.SOBT)  ?? 9999;
    if(sortBy === 'AOBT')    return parseHHMM(f.AOBT)  ?? 9999;
    return 9999;
  }

  const active = [...flights.values()]
    .filter(isActiveFlight)
    .sort((a, b) => getSortValue(a) - getSortValue(b));

  if (!active.length) {
    cards.innerHTML = `
      <div class="column is-12">
        <div class="empty-box" id="emptyBox">
          ${lang === "EN" ? "No flight in progress" : "Aucun vol en cours de traitement"}
        </div>
      </div>
    `;
    return;
  }

  cards.innerHTML = active.map(f => {
    const status = computeStatus(f);
    const flightNumber = `${f.Cie || ""}${f.NVol || ""}`.trim() || "--";
    const cd = computeCountdown(f);
    const eobtMins = computeEOBT(f);
    const eobtStr = eobtMins != null ? convertTime(fmtHHMM(eobtMins)) : convertTime(f.EOBT || "--:--");

    const arrVol  = (f.__depFF || f.__arrFF || (f.Cie||"") + (f.NVol||"")).trim() || "--";
    const from    = (f.From||"").toUpperCase();
    const to      = (f.To||"").toUpperCase();
    const route   = from && to ? from + " → " + to : (from || to || "--");
    const stand   = f.Parking ? "P" + f.Parking : "";
    const ctot    = f.CTOT || "";
    const immat   = (f.Immat||"").toUpperCase();
    const actype  = (f.TypeAvion||"").toUpperCase();
    const sub1    = route;
    const sub2    = [immat, actype].filter(Boolean).join(" · ");

    return `
      <div class="column is-4-desktop is-6-tablet is-12-mobile">
        <div class="card dashboard-card">
          <div class="card-content">

            <div class="header-line">
              <div style="flex:1;min-width:0;">
                <div class="flight-title">${arrVol}</div>
                ${f.Callsign ? `<div style="font-size:.78rem;font-weight:700;color:var(--muted);letter-spacing:.03em;">${f.Callsign}</div>` : ""}
                <div class="flight-subtitle">${sub1}</div>
                ${sub2 ? `<div class="flight-subtitle">${sub2}</div>` : ""}
              </div>
              <div class="status-center">
                <span class="tag ${status.tagClass} is-medium status-tag">${status.text}</span>
              </div>
              <div style="flex-shrink:0;display:flex;align-items:center;gap:6px;">
                ${stand ? `<div style="font-size:1.5rem;font-weight:900;line-height:1;">${stand}</div>` : ""}
                  <button class="close-btn" onmouseenter="showDetail('${f.flightKey}', this)" onmouseleave="scheduleHideDetail()" style="font-size:.75rem;font-weight:900;color:#3273dc;border:2px solid #3273dc;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;cursor:pointer;">i</button>
                <button class="close-btn" onclick="deleteFlight('${f.flightKey}')" title="Fermer" style="align-self:flex-start;">✕</button>
              </div>
            </div>

            <div class="mt-3 mb-3 card-status-block">
              <span class="tag ${status.tagClass} is-medium status-tag">
                ${status.text}
              </span>
            </div>

            <div class="kv-grid">

              <div class="kv-box" style="background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.08);">
                <div class="kv-k">SIBT</div>
                <div class="kv-v">${convertTime(f.SIBT) || "--:--"}</div>
              </div>

              ${(()=>{
                const c = delayColor(f.AIBT, f.SIBT);
                const s = c ? `background:${c.bg};border-color:${c.border};` : '';
                const t = c ? `color:${c.text};` : '';
                return `<div class="kv-box" style="${s}">
                  <div class="kv-k">AIBT</div>
                  <div class="kv-v" style="${t}">${convertTime(f.AIBT) || "--:--"}</div>
                </div>`;
              })()}

              <div class="kv-box" style="background:#16a34a;border-color:#16a34a;">
                <div class="kv-k" style="color:rgba(255,255,255,.75);">EOBT</div>
                <div class="kv-v" style="color:#fff;">${eobtStr}</div>
              </div>

              <div class="kv-box" style="${cd.over ? 'background:#fee2e2;border-color:#fca5a5;' : 'background:#93c5fd;border-color:#93c5fd;'}">
                <div class="kv-k" style="${cd.over ? 'color:#ef4444;' : 'color:rgba(0,0,0,.55);'}">COUNTDOWN</div>
                <div class="kv-v" style="${cd.over ? 'color:#ef4444;' : 'color:#111;'}">${cd.text}</div>
              </div>

              <div class="kv-box" style="background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.08);">
                <div class="kv-k">SOBT</div>
                <div class="kv-v">${convertTime(f.SOBT) || "--:--"}</div>
              </div>

              ${(()=>{
                const c = delayColor(f.AOBT, f.SOBT);
                const s = c ? `background:${c.bg};border-color:${c.border};` : '';
                const t = c ? `color:${c.text};` : '';
                return `<div class="kv-box" style="${s}">
                  <div class="kv-k">AOBT</div>
                  <div class="kv-v" style="${t}">${convertTime(f.AOBT) || "--:--"}</div>
                </div>`;
              })()}

            </div>

          </div>
        </div>
      </div>
    `;
  }).join("");

}

// ===== Helpers =====
function parseHHMM(str){
  if(!str || !String(str).includes(":")) return null;
  const[h,m]=String(str).split(":").map(Number);
  if(isNaN(h)||isNaN(m)) return null;
  return h*60+m;
}
function fmtHHMM(mins){
  const v=((mins%1440)+1440)%1440;
  return String(Math.floor(v/60)).padStart(2,"0")+":"+String(v%60).padStart(2,"0");
}
function diffSigned(t,ref){
  let d=t-ref;
  if(d>720)d-=1440;
  if(d<-720)d+=1440;
  return d;
}

// ===== Calcul EOBT selon compagnie/type (même logique que l'app) =====
function computeEOBT(f){
  const cie  = (f.Cie  || "").toUpperCase();
  const from = (f.From || "").toUpperCase().trim();
  const isBVA = from === "BVA" || !f.SOBT;

  const sibttxt = f.SIBT || "";
  const aibttxt = f.AIBT || "";
  const sobttxt = f.SOBT || "";
  const ctottxt = f.EOBT || "";

  // Vol ARR sans départ : pas d'EOBT calculable
  if(!sobttxt) return null;
  if(!cie || (!sibttxt && !isBVA)) return null;

  const SIBT = parseHHMM(isBVA ? sobttxt : sibttxt);
  const SOBT = parseHHMM(sobttxt);
  if(SIBT==null||SOBT==null) return null;

  const AIBT = isBVA ? SOBT : (aibttxt ? parseHHMM(aibttxt) : SIBT);
  if(AIBT==null) return null;

  const SIBT_ext = SIBT;
  const AIBT_ext = SIBT_ext + diffSigned(AIBT, SIBT);
  const SOBT_ext = SIBT_ext + diffSigned(SOBT, SIBT);

  const crewChange = !!(f.ArrPNT || f.ArrPNC);
  const isDelayed = AIBT_ext > SIBT_ext;

  let EOBT_raw_ext = null;

  if(!isDelayed){
    EOBT_raw_ext = SOBT_ext;
  } else if(cie==="FR"||cie==="RK"){
    const turn = crewChange ? 35 : 25;
    const candidate = AIBT_ext + turn;
    EOBT_raw_ext = candidate <= SOBT_ext ? SOBT_ext : candidate;
  } else if(cie==="W4"||cie==="W6"){
    const type = (f.TypeAvion||"").toUpperCase();
    const turn = (type==="A321"||type==="A21N"||type==="A21NY") ? 35 : 30;
    const candidate = AIBT_ext + turn;
    EOBT_raw_ext = candidate <= SOBT_ext ? SOBT_ext : candidate;
  } else {
    const rot = SOBT_ext - SIBT_ext;
    EOBT_raw_ext = AIBT_ext + rot;
  }

  let EOBT_raw = ((EOBT_raw_ext%1440)+1440)%1440;

  // Règle CTOT
  let EOBT_adj_ext = EOBT_raw_ext;
  if(ctottxt){
    const CTOT = parseHHMM(ctottxt);
    if(CTOT!=null){
      const CTOT_ext = EOBT_raw_ext + diffSigned(CTOT, EOBT_raw);
      if(CTOT_ext > EOBT_raw_ext + 15) EOBT_adj_ext = CTOT_ext - 15;
    }
  }

  return ((EOBT_adj_ext%1440)+1440)%1440;
}

// ===== CD : mm:ss, rouge si positif =====
function computeCountdown(f){
  const sobttxt = f.SOBT || "";
  const aobtTxt = f.AOBT || "";
  const from    = (f.From||"").toUpperCase().trim();
  const isBVA   = from === "BVA" || !sobttxt;
  const sibttxt = f.SIBT || "";
  const aibttxt = f.AIBT || "";

  // Vol ARR sans départ : pas de CD calculable
  if(!sobttxt) return {text:"--:--", over:false};
  if(!isBVA && (!aibttxt || !sibttxt)) return {text:"--:--", over:false};

  const SOBT = parseHHMM(sobttxt);
  const SIBT = isBVA ? SOBT : parseHHMM(sibttxt);
  const AIBT = isBVA ? SOBT : parseHHMM(aibttxt);
  if(SOBT==null||SIBT==null||AIBT==null) return {text:"--:--", over:false};

  // cible = SOBT si pas de retard, sinon EOBT calculé
  let targetMin = AIBT <= SIBT ? SOBT : computeEOBT(f);
  if(targetMin==null) return {text:"--:--", over:false};

  let totalSeconds;

  if(aobtTxt){
    // Vol parti : affiche diff AOBT - cible (figé)
    const AOBT = parseHHMM(aobtTxt);
    if(AOBT==null) return {text:"--:--", over:false};
    let diffMin = AOBT - targetMin;
    if(diffMin>720) diffMin-=1440;
    if(diffMin<-720) diffMin+=1440;
    totalSeconds = diffMin*60;
    const abs = Math.abs(totalSeconds);
    const mm = Math.floor(abs/60);
    const ss = abs%60;
    const sign = totalSeconds>=0 ? "+" : "-";
    return {text:`${sign}${String(mm).padStart(2,"0")}:${String(ss).padStart(2,"0")}`, over:totalSeconds>0};
  }

  // Live : décompte jusqu'à 0 puis +
  const now = new Date();
  // Toujours en local : les heures du vol sont saisies en local
  const nowMins = now.getHours()*60 + now.getMinutes();
  const nowSecs = now.getSeconds();
  let diffMin = targetMin - nowMins;
  if(diffMin<-720) diffMin+=1440;
  if(diffMin>720)  diffMin-=1440;
  totalSeconds = diffMin*60 - nowSecs;

  const sign = totalSeconds<=0 ? "+" : "";
  const abs = Math.abs(totalSeconds);
  const mm = Math.floor(abs/60);
  const ss = abs%60;
  return {text:`${sign}${String(mm).padStart(2,"0")}:${String(ss).padStart(2,"0")}`, over:totalSeconds<0};
}

function handleMessage(msg){

if(msg.__type==="snapshot"){

flights.clear()

;(msg.flights||[]).forEach(f=>{
if(f.flightKey && !deletedKeys.has(f.flightKey))flights.set(f.flightKey,f)
})

render()
return
}

if(msg.__type==="patch"){

if(!msg.flightKey)return
if(deletedKeys.has(msg.flightKey))return

const current=flights.get(msg.flightKey)||{flightKey:msg.flightKey}

flights.set(msg.flightKey,{
...current,
...(msg.payload||{})
})

render()
return
}

if(msg.__type==="remove"){

flights.delete(msg.flightKey)
render()

}

}

async function clearAll(){
  if(!confirm(lang==="EN" ? "Clear all flights?" : "Effacer tous les vols ?")) return;
  // Supprimer chaque vol localement et sur le serveur
  const keys = [...flights.keys()]
  for(const key of keys){
    deletedKeys.add(key)
    flights.delete(key)
    try{
      await fetch(`https://turnaround-sync.deruellehugo-49c.workers.dev/${encodeURIComponent(key)}`, {method:"DELETE"})
    }catch(e){}
  }
  render()
}

async function deleteFlight(flightKey){
  if(!flightKey) return;
  deletedKeys.add(flightKey);
  flights.delete(flightKey);
  render();
  try{
    const url = `https://turnaround-sync.deruellehugo-49c.workers.dev/${encodeURIComponent(flightKey)}`;
    const res = await fetch(url, { method: "DELETE" });
    if(!res.ok) alert("Erreur suppression: " + res.status);
  }catch(e){
    console.error("[DELETE] error:", e);
    alert("Erreur réseau: " + e.message);
  }
}

// ===== Conversion heure locale <-> UTC =====
function getLocalOffsetMins(){
  // offset en minutes : positif si UTC+x, négatif si UTC-x
  return -new Date().getTimezoneOffset();
}

function convertTime(hhmmStr){
  if(!hhmmStr || !hhmmStr.includes(":")) return hhmmStr;
  const mins = parseHHMM(hhmmStr);
  if(mins == null) return hhmmStr;
  if(isUTC){
    // local -> UTC : soustraire offset
    const utcMins = ((mins - getLocalOffsetMins()) % 1440 + 1440) % 1440;
    return fmtHHMM(utcMins);
  }
  return hhmmStr; // déjà local
}

function delayColor(actualStr, plannedStr){
  const actual  = parseHHMM(actualStr);
  const planned = parseHHMM(plannedStr);
  if(actual == null || planned == null) return null; // pas de couleur
  let diff = actual - planned;
  if(diff > 720)  diff -= 1440;
  if(diff < -720) diff += 1440;
  if(diff < 0)  return { bg:'#dbeafe', border:'#3b82f6', text:'#1d4ed8' }; // bleu - en avance
  if(diff === 0) return { bg:'#dcfce7', border:'#16a34a', text:'#15803d' }; // vert - à l'heure
  if(diff < 15)  return { bg:'#ffedd5', border:'#f97316', text:'#c2410c' }; // orange - retard < 15
  return           { bg:'#fee2e2', border:'#ef4444', text:'#b91c1c' };     // rouge - retard >= 15
}

let _detailHideTimer = null
function showDetail(key, btn){
  const f = flights.get(key)
  if(!f) return
  clearTimeout(_detailHideTimer)

  const popup = document.getElementById('detailPopup')
  const titleEl = document.getElementById('detailTitle')
  const contentEl = document.getElementById('detailContent')
  if(!popup) return

  const vol = (f.__depFF || f.__arrFF || (f.Cie||"")+(f.NVol||"")).trim() || "--"
  const pRoute = [f.From||"", f.To||""].filter(Boolean).join(" → ")
  titleEl.innerHTML = '<span style="font-weight:900;">' + vol + '</span>'
    + (pRoute ? '<span style="font-size:.8rem;font-weight:700;color:var(--muted);margin:0 .4rem;">' + pRoute + '</span>' : '')
    + (f.Parking ? '<span style="font-size:.8rem;font-weight:900;">P'+f.Parking+'</span>' : '')

  const rows = [
    ["Avitair ARR", f.ArriveeFuel], ["1er débarqué", f.PremierDebarque],
    ["Der débarqué", f.DernierDebarque], ["Lift ARR ↑", f.ArriveeLiftArr],
    ["Lift ARR ↓", f.DepartLiftArr], ["PNT ARR", f.ArrPNT], ["PNC ARR", f.ArrPNC],
    ["1er embarqué", f.AvionPremierEmbarque], ["Der embarqué", f.AvionDernierEmbarque],
    ["Lift DEP ↑", f.ArriveeLift], ["Lift DEP ↓", f.DepartLift],
    ["Avitair DEP", f.DepartFuel], ["INAD ARR", f.ArriveeINAD],
    ["Remise LID", f.RemiseLID], ["Fermeture porte", f.FermeturePorteAvion],
  ]

  contentEl.innerHTML = '<div class="detail-log">' +
    rows.map(([label, val]) => {
      const v = val ? convertTime(val) : ""
      const done = !!v
      return '<div class="detail-log-row">'
        + '<div class="detail-check ' + (done?'done':'') + '">✓</div>'
        + '<span class="detail-log-label' + (done?'':" empty") + '">' + label + '</span>'
        + '<span class="detail-log-time' + (done?'':" empty") + '">' + (v||"–") + '</span>'
        + '</div>'
    }).join("") + '</div>'

  const rect = btn.getBoundingClientRect()
  popup.style.display = "block"
  let top = rect.bottom + 8
  let left = rect.left - 240
  if(left < 8) left = 8
  if(top + 500 > window.innerHeight) top = rect.top - popup.offsetHeight - 8
  popup.style.top = top + "px"
  popup.style.left = left + "px"
}

function scheduleHideDetail(){
  _detailHideTimer = setTimeout(closeDetail, 300)
}

function closeDetail(){
  const modal = document.getElementById('detailModal')
  if(modal) modal.style.display = "none"
}
